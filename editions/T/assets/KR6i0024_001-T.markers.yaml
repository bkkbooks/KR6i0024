  - {type: variant, offset: 8641, length: 340, content: '從此已上九百佛一切賢聖。

      南無過現未來，十方三世，盡虛空界，一切諸佛，歸命懺悔：「至心懺悔！已懺諸業障竟，次復懺悔佛、法、僧間一切諸障。經中佛說：『人身難得，佛法難聞，眾僧難值，信心難生，六根難具，善友難得。』而今相與宿殖善根，得此人身，六根完具，又值善友，得聞正法。於其中間，復各不能盡心精勤，恐於未來，長溺萬苦，無有出期，是故今日，至到慚愧，皆悉懺悔。

      「又復無始已來至于今日，常以無明覆心，煩惱障意；見佛形像，不能盡心恭敬；輕蔑眾僧，殘害善友，破塔毀寺，焚燒形像，出佛身血；或自處華堂，安置尊像卑猥之處，使其烟熏日曝【CB】，𭨃【大】曝X74n1496_p0762a05-06𭨃、風吹雨露、塵土污坌、雀鼠殘毀，共住同宿，曾無禮敬；或裸露像身，初不嚴飾；或遮掩燈燭，或關閉殿宇，障佛光明。如是等罪，今悉懺悔。

      「又復無始已來至于今日，或於法間，以不淨手把捉經卷，或關閉箱篋虫噉朽爛，或首軸脫落、部黨失次，或縫脫漏誤、紙墨破裂，自不修理不肯流傳。如是等罪無量無邊，是故弟子，今日至誠，歸依諸佛。」', 宋: '', 元: '', 宮: ''}
