  - {type: variant, offset: 4769, length: 187, content: '從此已上五百佛，一切賢聖。

      南無過現未來十方三世，盡虛空界，一切諸佛，歸命懺悔：「至心懺悔！次懺劫盜之罪。經中說言：『若物屬他，他所守護，於此物中，一草一葉，不與不取，何況盜竊。』但自眾生，唯見現在利故，以種種不道而取，致使未來受此殃累。是故經言：『劫盜之罪，能令眾生，墮於地獄、餓鬼受苦；若在畜生，則受牛馬、驢騾、駱駝等形，以其所有身力血肉，償他宿債；若生人中，為他奴婢，衣不蔽形，食不充命，貧窮困苦，人理殆盡。』劫盜既有如是苦報，是故弟子等，今日至誠，歸依諸佛。」', 宋: '', 元: '', 宮: ''}
