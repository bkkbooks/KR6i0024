  - {type: variant, offset: 2744, length: 377, content: '從此已上三百佛一切賢聖。

      南無過現未來，十方三世，盡虛空界，一切諸佛，歸命懺悔：「至心懺悔！弟子等，今已總相懺悔一切諸業，今當次第更復一一別相懺悔，若總、若別、若麁、若細、若輕、若重、若說、不說，品類相從，願皆消滅。別相懺者，先懺身三，次懺口四，其餘諸障，次第稽顙。身三業者，第一殺害，如經所明，恕己【CB】，已【大】己X74n1496_p0762a05-06已可為喻，勿殺勿行杖。雖復禽獸之殊，保命畏死，其事是一，若尋此眾生，從無始已來，或是我父母、兄弟六親眷屬，以業因緣輪迴六道，出生入死改形易報，不復相識，而今興害，食噉其肉傷慈之甚，是故佛言：『設得餘食，當如飢世食子肉想，何況食噉此魚肉耶。』又言：『為利殺眾生，以錢納諸肉，二俱是惡業，死墮叫呼地獄。』故知，殺害及以食噉，罪深河海，過重丘岳。然弟子等，無始已來，不遇善友，皆由此業。是故經言：『殺害之罪，能令眾生，墮於地獄、餓鬼受苦。若在畜生，則受虎豹、豺狼、鷹鷂等身，或受毒蛇、蝮蝎等身，常懷惡心，或受麞鹿、熊羆等身，常懷恐怖。若生人中，得二種果報，一者多病、二者短命。』殺生食噉，既有如是，無量種種諸惡果報。是故弟子，今日至誠，歸依諸佛。」', 宋: '', 元: '', 宮: ''}
