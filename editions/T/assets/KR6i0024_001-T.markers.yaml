  - {type: line-break, offset: 9557, content: '', id: KR6i0024_T_001-0383a22, ed: T, 'n': 0383a22}
  - {type: xml-element, offset: 9557, content: '', id: pT14p0383a2201, name: p, role: open, attrs: {'xml:id': pT14p0383a2201}}
  - {type: variant, offset: 9557, length: 471, content: 南無過現未來，十方三世，盡虛空界，一切諸佛，歸命懺悔：「至心懺悔！弟子等，從無量劫來至于今日，於其中間，隨心造過，逐意為愆；是事乖違，觸途多犯；行三障路，入八邪林；上煩惱臺，昇無明殿；遂使禪池枯竭，靡引智慧之蓮；戒樹摧殘，不生三昧華葉；盛年放逸，造過無量無邊；無明覆心，為罪非一；十惡五逆，數若塵沙；三業六根，愆咎難述。由斯罪障，殃累後身，報種來生，墮於地獄。於是牛頭哮吼，牽就刀山，獄卒皺眉，驅上劍樹；一日一夜，萬死萬生；肉盡鑊湯之中，骨碎銅柱之側；鐵嘴之鳥，𪅎啄眼睛；銅㺃利牙，樝掣身首；寒氷痛炭，煮炙炮燒；碓擣磨摩，犁耕鋸解，如斯苦楚無量無邊，不可具陳、不可具說。弟子等，今對十方佛、法、僧前，所有罪障總相披陳。誠心懺悔已造之罪，並願隨懺消除；其未造者，自斯已後，改往修來，更不敢造。懺悔發願已，歸命禮三寶。此賢劫中，諸佛出世，名號如是。若人聞此千佛名字，不畏謬錯必得涅槃，諸有智者聞諸佛名字，應當一心，勿懷放逸，勤行精進。若失是緣，還墮惡趣，受諸苦惱。安住持戒，隨順多聞，常樂遠離，具足深忍，是人則能值遇千佛。若持誦此千佛名者，則滅無量阿僧祇劫所集眾罪，必得諸佛三昧神通，無礙智慧，及諸法門、諸陀羅尼，一切經書種種智慧，隨宜說法，皆當從是三昧中，求修習此三昧。當行淨命，勿生欺誑，離於名利，勿懷嫉妬，行六和敬，如是行者，疾得三昧法也, 宮: ''}
